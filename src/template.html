<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form novalidate>
      <div class="containerEmail">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" />
        <span class="error active">LayoutTest</span>
      </div>
      <div class="containerPostalCode">
        <label for="postalCode">Postal Code</label>
        <input type="number" name="postalCode" id="postalCode" />
        <span class="error active">LayoutTest</span>
      </div>
      <div class="containerArea">
        <label for="area">Area</label>
        <input type="text" name="area" id="area" />
        <span class="error active">LayoutTest</span>
      </div>
      <div class="containerPassword">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" />
        <span class="error active">LayoutTest</span>
      </div>
      <div class="containerPasswordConfirmation">
        <label for="passwordConfirmation">Repeat Password</label>
        <input
          type="password"
          name="passwordConfirmation"
          id="passwordConfirmation"
        />
        <span class="error active">LayoutTest</span>
      </div>
      <button class="signUpButton" type="button">Submit</button>
    </form>
  </body>
</html>
